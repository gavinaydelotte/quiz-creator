<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="FlashForge — create flashcard sets, study smart, and play games for any topic" />
  <title>FlashForge</title>
  <link rel="stylesheet" href="css/styles.css" />
  <!-- Apply saved theme before first paint to prevent flash -->
  <script>(function(){var t=localStorage.getItem('qf-theme')||'dark';document.documentElement.setAttribute('data-theme',t);})();</script>
  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
</head>
<body>

  <!-- ── Site Header / Nav ── -->
  <header class="site-header">
    <nav class="main-nav" aria-label="Main navigation">
      <a href="#/" class="navbar-logo" aria-label="FlashForge — go to home">
        <img src="FlashForge Logo.png" alt="FlashForge" class="logo-img" />
      </a>

      <ul class="nav-links" role="list">
        <li><a href="#/"        class="nav-link" aria-current="page">Home</a></li>
        <li><a href="#/library" class="nav-link">Library</a></li>
        <li><a href="#/games"   class="nav-link">Games</a></li>
      </ul>

      <div class="nav-actions">
        <button id="settings-btn" class="btn btn-ghost btn-sm" aria-label="Open settings">Settings</button>
        <!-- Auth nav — populated by JS -->
        <div id="auth-nav" class="auth-nav" aria-live="polite"></div>
        <a href="#/create" class="btn btn-primary btn-sm">New Set</a>
      </div>
    </nav>
  </header>

  <!-- ── Live region for page-change announcements ── -->
  <div id="page-announcer" role="status" aria-live="polite" aria-atomic="true" class="sr-only"></div>

  <!-- ── Main Content ── -->
  <main id="app"></main>

  <!-- ── Mobile Bottom Nav ── -->
  <nav class="mobile-nav" aria-label="Mobile navigation">
    <ul role="list">
      <li><a href="#/"        class="mobile-nav-link" aria-label="Home">Home</a></li>
      <li><a href="#/library" class="mobile-nav-link" aria-label="Library">Library</a></li>
      <li><a href="#/games"   class="mobile-nav-link" aria-label="Games">Games</a></li>
      <li><a href="#/create"  class="mobile-nav-link mobile-nav-create" aria-label="Create new set">+ New</a></li>
    </ul>
  </nav>

  <!-- ════════════════════════════════════════
       Dialogs
       ════════════════════════════════════════ -->

  <!-- AI Generator Dialog -->
  <dialog id="ai-dialog" aria-labelledby="ai-dialog-title" aria-describedby="ai-dialog-desc">
    <article class="dialog-inner">
      <header class="dialog-header">
        <h2 id="ai-dialog-title">Generate with AI</h2>
        <button type="button" id="ai-close" class="btn btn-ghost btn-icon" aria-label="Close dialog">&#10005;</button>
      </header>

      <form id="ai-form" class="dialog-body" novalidate>
        <p id="ai-dialog-desc">
          Describe any topic and GPT-4o mini will generate flashcard pairs for you — academic or not.
        </p>

        <div class="field">
          <label for="ai-topic">Topic or prompt</label>
          <textarea
            id="ai-topic"
            class="input"
            rows="3"
            placeholder="e.g. The French Revolution, JavaScript async/await, types of pasta, 90s hip-hop albums..."
            required
            aria-required="true"
          ></textarea>
        </div>

        <div class="field">
          <label for="ai-count">Number of cards</label>
          <input id="ai-count" type="number" class="input" min="3" max="20" value="8" />
        </div>

        <div id="ai-error" role="alert" class="ai-error" hidden></div>
      </form>

      <footer class="dialog-footer">
        <button type="button" id="ai-cancel" class="btn btn-ghost">Cancel</button>
        <button type="submit" form="ai-form" id="ai-generate" class="btn btn-primary">Generate</button>
      </footer>
    </article>
  </dialog>

  <!-- Settings Dialog -->
  <dialog id="settings-dialog" aria-labelledby="settings-title">
    <article class="dialog-inner">
      <header class="dialog-header">
        <h2 id="settings-title">Settings</h2>
        <button type="button" id="settings-close" class="btn btn-ghost btn-icon" aria-label="Close dialog">&#10005;</button>
      </header>

      <form id="settings-form" class="dialog-body" novalidate>

        <!-- Theme -->
        <div class="field">
          <label>Theme</label>
          <div class="settings-theme-row">
            <button type="button" id="theme-dark-btn"  class="btn settings-theme-btn">Dark</button>
            <button type="button" id="theme-light-btn" class="btn settings-theme-btn">Light</button>
          </div>
        </div>

        <div class="settings-divider"></div>

        <!-- OpenAI API Key -->
        <div class="field">
          <label for="api-key-input">OpenAI API Key</label>
          <input id="api-key-input" type="password" class="input" placeholder="sk-..." autocomplete="off" />
          <p class="field-hint">
            Get a key at <a href="https://platform.openai.com/api-keys" target="_blank" rel="noopener noreferrer">platform.openai.com/api-keys</a>
          </p>
        </div>

      </form>

      <footer class="dialog-footer">
        <button type="button" id="settings-cancel" class="btn btn-ghost">Cancel</button>
        <button type="submit" form="settings-form" id="settings-save" class="btn btn-primary">Save</button>
      </footer>
    </article>
  </dialog>

  <!-- Confirm / Delete Dialog -->
  <dialog id="confirm-dialog" aria-labelledby="confirm-title" aria-describedby="confirm-msg">
    <article class="dialog-inner">
      <header class="dialog-header">
        <h2 id="confirm-title">Are you sure?</h2>
      </header>
      <div class="dialog-body">
        <p id="confirm-msg"></p>
      </div>
      <footer class="dialog-footer">
        <button id="confirm-cancel" class="btn btn-ghost">Cancel</button>
        <button id="confirm-ok"     class="btn btn-danger">Delete</button>
      </footer>
    </article>
  </dialog>

  <script src="js/firebase-config.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/sr.js"></script>
  <script src="js/history.js"></script>
  <script src="js/streak.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/sync.js"></script>
  <script src="js/ai.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
